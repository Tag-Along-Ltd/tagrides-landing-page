<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60" fill="none" role="img" aria-label="Tag Rides mark">
  <title>Tag Rides — Stronger Together mark</title>
  <defs>
    <mask id="cut-teal">
      <rect width="100" height="60" fill="white"/>
      <circle cx="65" cy="30" r="22" fill="black"/>
    </mask>
  </defs>
  <!-- Teal ring (full) -->
  <circle cx="35" cy="30" r="22" stroke="#008080" stroke-width="6"/>
  <!-- Amber ring, masked to read as interlocked behind the teal -->
  <g mask="url(#cut-teal)">
    <circle cx="65" cy="30" r="22" stroke="#F59E0B" stroke-width="6"/>
  </g>
  <!-- Teal arc back on top for the over/under interlace -->
  <path d="M 56 17 A 22 22 0 0 1 56 43" stroke="#008080" stroke-width="6" stroke-linecap="round"/>
</svg>
